services:
  altinity-mcp-local:
    image: ghcr.io/altinity/altinity-mcp:latest
    container_name: altinity-mcp-local
    restart: unless-stopped
    env_file:
      - .env
    environment:
      MCP_TRANSPORT: ${LOCAL_MCP_TRANSPORT:-http}
      MCP_ADDRESS: 0.0.0.0
      MCP_PORT: 8080
      MCP_OPENAPI: ${LOCAL_MCP_OPENAPI:-http}
      MCP_CORS_ORIGIN: "*"
      LOG_LEVEL: ${LOCAL_MCP_LOG_LEVEL:-info}
      CLICKHOUSE_HOST: ${ALTINITY_HOST}
      CLICKHOUSE_PORT: 8443
      CLICKHOUSE_PROTOCOL: http
      CLICKHOUSE_TLS: "true"
      CLICKHOUSE_DATABASE: ${ALTINITY_DATABASE:-default}
      CLICKHOUSE_USERNAME: ${ALTINITY_USER}
      CLICKHOUSE_PASSWORD: ${ALTINITY_PASSWORD}
      CLICKHOUSE_READ_ONLY: "true"
    ports:
      - "${LOCAL_MCP_PORT:-8080}:8080"
